<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SERENE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(circle at top right, #eef2ff, transparent),
                        radial-gradient(circle at bottom left, #fdf2f8, transparent);
        }
        .form-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: var(--transition); }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <a href="index.html" class="logo"><i class="fas fa-circle-notch"></i> SERENE</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="register.html" class="nav-link">Join Now</a>
        </div>
    </nav>

    <main class="login-page">
        <div class="form-card animate-in">
            <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 10px; text-align: center;">Welcome Back</h2>
            <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px;">Sign in to access your curated collection.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--primary);"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary); font-weight: 600;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px;">Sign In</button>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 700;">Join Serene</a>
            </div>
        </div>
    </main>

    <script type="module">
        import Auth from './js/auth.js';
        Auth.init();

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            const pass = e.target.querySelector('input[type="password"]').value;

            const result = Auth.login(email, pass);
            if (result.success) {
                alert(`Welcome back, ${result.user.name}!`);
                window.location.href = 'index.html';
            } else {
                alert(result.message);
            }
        };
    </script>
</body>
</html>
