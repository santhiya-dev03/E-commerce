<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now | SERENE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(circle at top right, #fdf2f8, transparent),
                        radial-gradient(circle at bottom left, #eef2ff, transparent);
        }
        .form-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: var(--transition); }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <a href="index.html" class="logo"><i class="fas fa-circle-notch"></i> SERENE</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="login.html" class="nav-link">Login</a>
        </div>
    </nav>

    <main class="register-page">
        <div class="form-card animate-in">
            <h2 style="font-size: 2rem; font-weight: 900; margin-bottom: 10px; text-align: center;">Create Account</h2>
            <p style="color: var(--text-muted); text-align: center; margin-bottom: 30px;">Join the elite community of tech enthusiasts.</p>
            
            <form id="register-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="At least 8 characters" required minlength="8">
                </div>
                <div style="margin-bottom: 25px; font-size: 0.85rem; color: var(--text-muted);">
                    By signing up, you agree to our <a href="#" style="color: var(--primary); font-weight: 600;">Terms of Service</a> and <a href="#" style="color: var(--primary); font-weight: 600;">Privacy Policy</a>.
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px;">Join Serene</button>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Sign In</a>
            </div>
        </div>
    </main>

    <script type="module">
        import Auth from './js/auth.js';
        import UI from './js/ui.js';
        Auth.init();

        document.getElementById('register-form').onsubmit = (e) => {
            e.preventDefault();
            const firstName = e.target.querySelectorAll('input')[0].value;
            const lastName = e.target.querySelectorAll('input')[1].value;
            const email = e.target.querySelectorAll('input')[2].value;
            const pass = e.target.querySelectorAll('input')[3].value;

            const result = Auth.register(`${firstName} ${lastName}`, email, pass);
            if (result.success) {
                UI.showToast(`Welcome to the community, ${firstName}!`);
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                UI.showToast(result.message, 'error');
            }
        };
    </script>
</body>
</html>
